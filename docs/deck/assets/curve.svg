<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 430" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <!-- accuracy-over-sessions curve · pricing scenario · each point = mean of 3 runs -->
  <!-- data: checkpoints [5..9], ours [0.933,1,1,1,1], handoff [0.8,0.4,0.4,0.4,0.4] -->

  <!-- gridlines -->
  <g stroke="#e1e0d9" stroke-width="1">
    <line x1="80" y1="50"  x2="640" y2="50"/>
    <line x1="80" y1="125" x2="640" y2="125"/>
    <line x1="80" y1="200" x2="640" y2="200"/>
    <line x1="80" y1="275" x2="640" y2="275"/>
  </g>
  <!-- baseline -->
  <line x1="80" y1="350" x2="640" y2="350" stroke="#c3c2b7" stroke-width="1"/>

  <!-- y tick labels -->
  <g fill="#898781" font-size="13" text-anchor="end">
    <text x="68" y="54">1.0</text>
    <text x="68" y="129">0.75</text>
    <text x="68" y="204">0.5</text>
    <text x="68" y="279">0.25</text>
    <text x="68" y="354">0</text>
  </g>
  <!-- y axis title -->
  <text x="12" y="30" fill="#52514e" font-size="13">Answer accuracy</text>

  <!-- x tick labels -->
  <g fill="#898781" font-size="13" text-anchor="middle">
    <text x="80"  y="374">S5</text>
    <text x="220" y="374">S6</text>
    <text x="360" y="374">S7</text>
    <text x="500" y="374">S8</text>
    <text x="640" y="374">S9</text>
  </g>
  <text x="360" y="404" fill="#898781" font-size="13" text-anchor="middle">Checkpoint — memory built up through session N, then re-asked</text>

  <!-- handoff baseline (aqua, slot 2) -->
  <polyline points="80,110 220,230 360,230 500,230 640,230" fill="none" stroke="#1baf7a" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <g fill="#1baf7a" stroke="#ffffff" stroke-width="2">
    <circle cx="80"  cy="110" r="4.5"/>
    <circle cx="220" cy="230" r="4.5"/>
    <circle cx="360" cy="230" r="4.5"/>
    <circle cx="500" cy="230" r="4.5"/>
    <circle cx="640" cy="230" r="4.5"/>
  </g>

  <!-- mnemosure (blue, slot 1) -->
  <polyline points="80,70 220,50 360,50 500,50 640,50" fill="none" stroke="#2a78d6" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <g fill="#2a78d6" stroke="#ffffff" stroke-width="2">
    <circle cx="80"  cy="70" r="4.5"/>
    <circle cx="220" cy="50" r="4.5"/>
    <circle cx="360" cy="50" r="4.5"/>
    <circle cx="500" cy="50" r="4.5"/>
    <circle cx="640" cy="50" r="4.5"/>
  </g>

  <!-- direct series labels (right of last point) -->
  <text x="654" y="54"  fill="#0b0b0b" font-size="14" font-weight="600">Mnemosure</text>
  <text x="654" y="234" fill="#0b0b0b" font-size="14" font-weight="600">Handoff notes</text>

  <!-- selective value labels: first and last points -->
  <g font-size="12.5" font-weight="600">
    <text x="80"  y="92"  fill="#2a78d6" text-anchor="middle">0.93</text>
    <text x="640" y="36"  fill="#2a78d6" text-anchor="middle">1.00</text>
    <text x="104" y="114" fill="#1baf7a" text-anchor="start">0.80</text>
    <text x="640" y="254" fill="#1baf7a" text-anchor="middle">0.40</text>
  </g>
</svg>
